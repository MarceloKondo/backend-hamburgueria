<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Painel SaaS</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#0f172a;
    color:#e2e8f0;
    padding:20px;
}
.hidden { display:none; }

.header {
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.cards {
    display:flex;
    gap:10px;
    margin:20px 0;
    flex-wrap:wrap;
}

.card {
    background:#1e293b;
    padding:15px;
    border-radius:8px;
    text-align:center;
    min-width:120px;
}

input {
    padding:8px;
    margin:5px;
    border-radius:5px;
    border:none;
}

button {
    padding:6px 10px;
    margin:2px;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

.btn-blue { background:#3b82f6; color:white; }
.btn-red { background:#ef4444; color:white; }
.btn-green { background:#22c55e; color:white; }
.btn-yellow { background:#eab308; color:black; }

table {
    width:100%;
    border-collapse:collapse;
}

th, td {
    padding:10px;
    border-bottom:1px solid #334155;
}

.login-box {
    max-width:300px;
    margin:100px auto;
    text-align:center;
}
</style>
</head>

<body>

<div id="loginBox" class="login-box">
    <h2>🔐 Login Painel</h2>
    <input id="senha" type="password" placeholder="Senha"><br>
    <button class="btn-blue" onclick="login()">Entrar</button>
</div>

<div id="painel" class="hidden">

<div class="header">
    <h2>📊 Painel SaaS</h2>
    <button onclick="logout()" class="btn-red">Sair</button>
</div>

<div class="cards" id="cards"></div>

<h3>➕ Gerar Licença</h3>
<input id="cliente" placeholder="Cliente">
<input id="dias" placeholder="Dias">
<button class="btn-blue" onclick="gerar()">Gerar</button>

<table id="tabela"></table>

</div>

<script>

// 🔥 USA MESMO DOMÍNIO (FUNCIONA NO RENDER)
const API = "/api/v1/licenca";

// 🔐 senha simples (troca depois se quiser)
const SENHA = "Mk@td040184";

// ================= LOGIN =================
function login(){
    const s = document.getElementById("senha").value;
    if(s === SENHA){
        localStorage.setItem("auth", "ok");
        iniciarPainel();
    } else {
        alert("Senha incorreta");
    }
}

function logout(){
    localStorage.removeItem("auth");
    location.reload();
}

function iniciarPainel(){
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("painel").style.display = "block";
    carregar();
}

// ================= API =================
async function carregar(){
    try{
        const res = await fetch(API + "/painel");
        const dados = await res.json();

        let ativos=0, expirados=0, bloqueados=0;

        let html = "<tr><th>Cliente</th><th>Status</th><th>Chave</th><th>Dias</th><th>Ações</th></tr>";

        dados.forEach(l=>{

            if(l.statusFinal==="ATIVO") ativos++;
            if(l.statusFinal==="EXPIRADO") expirados++;
            if(l.statusFinal==="BLOQUEADO") bloqueados++;

            let dias = Math.ceil((l.expira_em - Date.now()) / 86400000);
            if(isNaN(dias) || dias < 0) dias = 0;

            html += `
            <tr>
                <td>${l.cliente_nome || "-"}</td>
                <td>${l.statusFinal}</td>
                <td>${l.chave}</td>
                <td>${dias}</td>
                <td>
                    <button class="btn-red" onclick="bloquear('${l.chave}')">Bloq</button>
                    <button class="btn-green" onclick="desbloquear('${l.chave}')">OK</button>
                    <button class="btn-blue" onclick="copiar('${l.chave}')">📋</button>
                </td>
            </tr>`;
        });

        document.getElementById("tabela").innerHTML = html;

        document.getElementById("cards").innerHTML = `
            <div class="card">Ativos<br>${ativos}</div>
            <div class="card">Expirados<br>${expirados}</div>
            <div class="card">Bloqueados<br>${bloqueados}</div>
        `;
    }catch(err){
        console.log(err);
        alert("Erro ao carregar painel");
    }
}

// ================= AÇÕES =================
async function gerar(){
    const diasInput = parseInt(document.getElementById("dias").value);

    await fetch(API+"/gerar",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
            cliente:document.getElementById("cliente").value,
            dias: isNaN(diasInput) ? 30 : diasInput
        })
    });

    carregar();
}

async function bloquear(c){
    await fetch(API+"/bloquear",{ 
        method:"POST", 
        headers:{"Content-Type":"application/json"}, 
        body: JSON.stringify({chave:c}) 
    });
    carregar();
}

async function desbloquear(c){
    await fetch(API+"/desbloquear",{ 
        method:"POST", 
        headers:{"Content-Type":"application/json"}, 
        body: JSON.stringify({chave:c}) 
    });
    carregar();
}

function copiar(c){
    navigator.clipboard.writeText(c);
    alert("Copiado!");
}

// ================= INIT =================
if(localStorage.getItem("auth") === "ok"){
    iniciarPainel();
}
</script>

</body>
</html>
